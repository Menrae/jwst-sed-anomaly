# ── quality_config.yaml ───────────────────────────────────────────────────────
# Mirrors tsdat's quality.yaml: a list of checkers, each with a variable
# target, threshold, and handler action.
# ─────────────────────────────────────────────────────────────────────────────

last_updated: "2026-07-10T00:03:17Z"
git_commit_hash: "a8b4c29b019bf095456bbc6b7c473f8bcef9deb9"

checkers:

  - name: sed_residual_range
    description: >
      Flag sources where any per-band SED residual (|obs-model|/err)
      exceeds the threshold. Extreme residuals indicate either photometric
      outliers, catastrophic photo-z failures, or genuinely anomalous SEDs.
    variable: residuals          # xr.Dataset variable name
    threshold: 5.0               # sigma
    handler: flag_and_log
    qc_variable: qc_residual_outlier
    applies_to: all_bands

  - name: photometric_coverage_fraction
    description: >
      Flag sources where the fraction of valid (non-NaN, non-zero) flux
      measurements falls below the minimum coverage threshold.
      Under-sampled SEDs produce unreliable anomaly scores.
    variable: flux_coverage_fraction
    threshold: 0.5               # require ≥50% band coverage
    handler: flag_and_log
    qc_variable: qc_poor_coverage

  - name: photoz_chi2_excess
    description: >
      Flag sources with anomalously high EAZY best-fit chi2, which may
      indicate catastrophic photo-z failure rather than a genuine SED anomaly.
    variable: chi2_eazy
    threshold: 10.0
    handler: flag_and_log
    qc_variable: qc_chi2_excess

  - name: redshift_range_filter
    description: >
      Remove sources outside the science redshift window. Keeps only
      z_phot in [z_min, z_max] as configured in pipeline_config.yaml.
    variable: z_phot
    threshold:
      min: 0.5
      max: 10.0
    handler: drop_source
    qc_variable: qc_redshift_out_of_range

  - name: eazy_fit_failure
    description: >
      Exclude sources where EAZY's fit_at_zbest could not identify a valid
      best-fit redshift (chi2_eazy < 0, eazy-py's own failure sentinel) from
      the anomaly-scoring checkers (Isolation Forest, UMAP+DBSCAN). A
      non-converged fit forces degenerate template photometry that produces
      erratic per-band residuals the checkers read as maximally anomalous --
      verified against the real CEERS catalogue, where this dominated the
      top-2% flagged population (~94%) with fit-failure artifacts rather
      than genuine SED anomalies.
    variable: chi2_eazy
    threshold: 0.0                # chi2_eazy < 0 sentinel
    handler: exclude_from_scoring
    qc_variable: qc_eazy_fit_failure

handlers:
  flag_and_log:
    description: >
      Set the qc_ variable to 1 for failing sources and log a warning.
      Source is retained in the dataset but marked for downstream filtering.
  drop_source:
    description: >
      Remove the source entirely from the dataset and log the count of
      dropped sources at the end of the QC stage.
  exclude_from_scoring:
    description: >
      Set the qc_ variable to True for failing sources and exclude them from
      the anomaly-scoring checkers entirely -- unlike flag_and_log, these
      sources do not influence the fitted models or score normalisation.
      Sources are retained in the dataset with qc_iso_forest_score/
      qc_umap_outlier/qc_anomaly_score left NaN (not scored), rather than
      assigned a value alongside everyone else.
